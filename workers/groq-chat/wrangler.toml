name = "groq-chat"
main = "worker.js"
compatibility_date = "2024-11-01"

# Set secrets with:
#   npx wrangler secret put GROQ_API_KEY
#
# Optional vars:
#   GROQ_MODEL=llama-3.1-8b-instant
#   RAG_TOP_K=4

[vars]
GROQ_MODEL = "llama-3.1-8b-instant"
RAG_TOP_K = "4"

# Persist console.log output so you can inspect user questions in the dashboard.
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
persist = true
head_sampling_rate = 1
