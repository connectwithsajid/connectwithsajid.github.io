name: Refresh GitHub Insights

on:
  schedule:
    - cron: "18 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate GitHub insights JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: connectwithsajid
        run: python3 scripts/fetch_github_insights.py

      - name: Commit updated insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/github-insights.json
          git diff --cached --quiet || git commit -m "chore: refresh github insights"
          git push
