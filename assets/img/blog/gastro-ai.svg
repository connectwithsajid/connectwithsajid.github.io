<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">X-GastroAI medical AI thumbnail</title>
  <desc id="desc">Abstract medical AI interface with gastric screening, model confidence, and Grad-CAM style heatmap panels.</desc>
  <defs>
