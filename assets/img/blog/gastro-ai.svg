      <stop offset="0.54" stop-color="#c58a63" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#a99bbd" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
